<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pure Flow - Nature Elements Mixer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: "Helvetica Neue", Arial, sans-serif; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; cursor: pointer; }
        .controls {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 6px;
            background: rgba(255, 255, 255, 0.65); padding: 18px; border-radius: 20px; backdrop-filter: blur(10px);
            min-width: 260px; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            max-height: 90vh; overflow-y: auto;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .controls.hidden { opacity: 0; transform: translate(-50%, -45%); pointer-events: none; }
        button#btn { 
            width: 45px; height: 45px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); 
            background: #fff; cursor: pointer; transition: all 0.3s ease; outline: none; margin-bottom: 5px;
        }
        button#btn.active { background: #000; border-color: #000; transform: scale(0.9); }
        details { width: 100%; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 4px 0; }
        summary { 
            color: #000; font-size: 10px; font-weight: bold; letter-spacing: 2px; 
            cursor: pointer; outline: none; list-style: none; padding: 4px;
            display: flex; align-items: center; justify-content: flex-start;
            opacity: 0.7;
        }
        .part-switch { margin-right: 12px; width: 14px; height: 14px; cursor: pointer; accent-color: #000; }
        .summary-text { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; }
        .summary-text::after { content: '＋'; font-size: 10px; }
        details[open] .summary-text::after { content: '－'; }
        .slider-group { padding: 8px 5px; display: flex; flex-direction: column; gap: 6px; }
        .slider-item { display: flex; flex-direction: column; gap: 1px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #000; }
        .label { color: #000; font-size: 7px; letter-spacing: 1.5px; opacity: 0.5; text-transform: uppercase; }
        .logo-container {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 5; text-decoration: none; color: #000; text-align: center; white-space: nowrap;
        }
        .logo-text { font-size: 11px; font-weight: 300; letter-spacing: 0.3em; opacity: 0.4; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .logo-symbol { display: inline-block; width: 8px; height: 8px; background-color: #000; border-radius: 50%; margin-left: 8px; margin-right: 4px; margin-top: -1px;}
        .logo-symbol-outline { display: inline-block; width: 6px; height: 6px; border: 1px solid #000; border-radius: 50%; margin-top: -1px;}
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <div class="controls" id="panel">
        <button id="btn"></button>
        
        <details>
            <summary><input type="checkbox" id="mistEnable" class="part-switch" checked><div class="summary-text">MIST</div></summary>
            <div class="slider-group">
                <div class="slider-item"><div class="label">Volume</div><input type="range" id="mistVolRange" min="0" max="1" step="0.01" value="0.4"></div>
                <div class="slider-item"><div class="label">Color (Density)</div><input type="range" id="filterRange" min="0.2" max="0.8" step="0.01" value="0.3"></div>
                <div class="slider-item"><div class="label">Stereo Width</div><input type="range" id="stereoRange" min="0" max="1" step="0.01" value="0.5"></div>
                <div class="slider-item"><div class="label">Flow Height</div><input type="range" id="waveHeightRange" min="0" max="1" step="0.01" value="0.5"></div>
                <div class="slider-item"><div class="label">Flow Width</div><input type="range" id="waveWidthRange" min="0" max="1" step="0.01" value="0.7"></div>
            </div>
        </details>

        <details>
            <summary><input type="checkbox" id="dropEnable" class="part-switch" checked><div class="summary-text">DROP</div></summary>
            <div class="slider-group">
                <div class="slider-item"><div class="label">Volume</div><input type="range" id="dropVolRange" min="0" max="1" step="0.01" value="0.3"></div>
                <div class="slider-item"><div class="label">Resonance</div><input type="range" id="reverbRange" min="0" max="1" step="0.01" value="0.5"></div>
                <div class="slider-item"><div class="label">Density</div><input type="range" id="intervalRange" min="100" max="3000" step="50" value="2000"></div>
            </div>
        </details>

        <details>
            <summary><input type="checkbox" id="birdEnable" class="part-switch" checked><div class="summary-text">BIRD</div></summary>
            <div class="slider-group">
                <div class="slider-item"><div class="label">Volume</div><input type="range" id="birdVolRange" min="0" max="1" step="0.01" value="0.25"></div>
                <div class="slider-item"><div class="label">Chirp Speed</div><input type="range" id="birdPitchSpeedRange" min="0.05" max="0.5" step="0.01" value="0.15"></div>
                <div class="slider-item"><div class="label">Density</div><input type="range" id="birdIntervalRange" min="100" max="3000" step="50" value="1500"></div>
            </div>
        </details>
    </div>

    <a href="https://www.instagram.com/point_circle_insta/" target="_blank" class="logo-container" id="logoLink">
        <div class="logo-text">DESIGNED BY <span class="logo-symbol"></span><span class="logo-symbol-outline"></span></div>
    </a>

    <script>
        let audioCtx, scriptNode, mistGain, dropGain, birdGain, reverbNode, reverbGain, analyser;
        let lastOutL = 0, lastOutR = 0, baseFilterWeight = 0.3, stereoWidth = 0.5, waveHeight = 0.5, waveWidth = 0.7;
        let isPlaying = false, dropTimer, birdTimer, isVisible = true, phaseA = 0, phaseB = 0, phaseC = 0;

        const s = {
            mistVol: document.getElementById('mistVolRange'), filter: document.getElementById('filterRange'),
            stereo: document.getElementById('stereoRange'), waveHeight: document.getElementById('waveHeightRange'),
            waveWidth: document.getElementById('waveWidthRange'), dropVol: document.getElementById('dropVolRange'),
            reverb: document.getElementById('reverbRange'), interval: document.getElementById('intervalRange'),
            birdVol: document.getElementById('birdVolRange'), birdPitchSpeed: document.getElementById('birdPitchSpeedRange'),
            birdInterval: document.getElementById('birdIntervalRange')
        };
        const en = { mist: document.getElementById('mistEnable'), drop: document.getElementById('dropEnable'), bird: document.getElementById('birdEnable') };
        const canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');
        
        const getMistGain = (v) => en.mist.checked ? parseFloat(v) * 0.36 : 0;
        const getDropGain = (v) => en.drop.checked ? parseFloat(v) : 0;
        const getBirdGain = (v) => en.bird.checked ? parseFloat(v) * 0.6 : 0;

        document.addEventListener('visibilitychange', () => { isVisible = (document.visibilityState === 'visible'); });
        canvas.addEventListener('click', () => { document.getElementById('panel').classList.toggle('hidden'); });
        [en.mist, en.drop, en.bird].forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); updateVolumes(); }));

        function updateVolumes() {
            if (!isPlaying || !audioCtx) return;
            const n = audioCtx.currentTime;
            mistGain.gain.setTargetAtTime(getMistGain(s.mistVol.value), n, 0.1);
            dropGain.gain.setTargetAtTime(getDropGain(s.dropVol.value), n, 0.1);
            birdGain.gain.setTargetAtTime(getBirdGain(s.birdVol.value), n, 0.1);
        }

        s.filter.addEventListener('input', (e) => baseFilterWeight = parseFloat(e.target.value));
        s.stereo.addEventListener('input', (e) => stereoWidth = parseFloat(e.target.value));
        s.waveHeight.addEventListener('input', (e) => waveHeight = parseFloat(e.target.value));
        s.waveWidth.addEventListener('input', (e) => waveWidth = parseFloat(e.target.value));
        s.mistVol.addEventListener('input', updateVolumes); s.dropVol.addEventListener('input', updateVolumes); s.birdVol.addEventListener('input', updateVolumes);
        s.reverb.addEventListener('input', (e) => { if (reverbGain && isPlaying) reverbGain.gain.setTargetAtTime(parseFloat(e.target.value), audioCtx.currentTime, 0.05); });

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            if (tempCanvas) { tempCanvas.width = canvas.width; tempCanvas.height = canvas.height; }
            prepareImageData();
        }
        window.addEventListener('resize', resize);

        let imgData, tempCanvas, tempCtx;
        function prepareImageData() {
            imgData = ctx.createImageData(canvas.width, 1);
            if (!tempCanvas) { tempCanvas = document.createElement('canvas'); tempCtx = tempCanvas.getContext('2d'); }
            tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
            tempCtx.fillStyle = '#fff'; tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
        }
        prepareImageData(); resize();

        function createReverb() {
            const len = audioCtx.sampleRate * 4; const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
            for (let c = 0; c < 2; c++) { const d = buf.getChannelData(c); for (let i = 0; i < len; i++) { d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 4); } }
            const node = audioCtx.createConvolver(); node.buffer = buf; return node;
        }

        const scale = [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51, 1567.98, 1760.00, 2093.00, 2349.32, 2637.02, 3135.96, 3520.00];

        function playDrop() {
            if (!isPlaying) return; if (!en.drop.checked) { dropTimer = setTimeout(playDrop, 500); return; }
            const n = audioCtx.currentTime; const f = scale[Math.floor(Math.random() * scale.length)];
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(f * 2, n); osc.frequency.exponentialRampToValueAtTime(f, n + 0.02);
            const interval = 3100 - (parseInt(s.interval.value) || 2000); const decay = Math.min(1.2, (interval / 1000) + 0.1);
            g.gain.setValueAtTime(0, n); g.gain.linearRampToValueAtTime(0.3, n + 0.005); g.gain.exponentialRampToValueAtTime(0.001, n + decay);
            osc.connect(g); g.connect(dropGain); osc.start(n); osc.stop(n + decay + 0.1);
            dropTimer = setTimeout(playDrop, interval * (Math.random() * 0.4 + 0.8));
        }

        function playBird(bc = 0) {
            if (!isPlaying) return; if (!en.bird.checked) { birdTimer = setTimeout(() => playBird(0), 500); return; }
            const n = audioCtx.currentTime; const bs = scale.slice(15);
            const f = bs[Math.floor(Math.random() * bs.length)] * (0.95 + Math.random() * 0.1);
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.type = 'sine';
            const st = (parseFloat(s.birdPitchSpeed.value) || 0.15) * (0.8 + Math.random() * 0.4);
            osc.frequency.setValueAtTime(f * (Math.random() > 0.5 ? 1.5 : 0.7), n); osc.frequency.exponentialRampToValueAtTime(f, n + st);
            g.gain.setValueAtTime(0, n); g.gain.linearRampToValueAtTime(0.2, n + 0.01); g.gain.exponentialRampToValueAtTime(0.001, n + st + 0.05);
            osc.connect(g); g.connect(birdGain); osc.start(n); osc.stop(n + st + 0.1);
            let nb = 0, ni = 0;
            if (bc > 0) { nb = bc - 1; ni = 50 + Math.random() * 100; }
            else { if (Math.random() > 0.7) { nb = Math.floor(Math.random() * 4) + 1; ni = 80; }
            else { nb = 0; ni = (3100 - (parseInt(s.birdInterval.value) || 1500)) * (0.6 + Math.random() * 0.7); } }
            birdTimer = setTimeout(() => playBird(nb), ni);
        }

        document.getElementById('btn').addEventListener('click', async (e) => {
            e.stopPropagation(); if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            if (isPlaying) {
                isPlaying = false; clearTimeout(dropTimer); clearTimeout(birdTimer); document.getElementById('btn').classList.remove('active');
                const n = audioCtx.currentTime; [mistGain, dropGain, birdGain].forEach(g => g && g.gain.setTargetAtTime(0, n, 0.2));
                setTimeout(() => { if(scriptNode) scriptNode.disconnect(); if(analyser) analyser.disconnect(); scriptNode = null; }, 1000);
            } else {
                isPlaying = true; document.getElementById('btn').classList.add('active');
                scriptNode = audioCtx.createScriptProcessor(4096, 0, 2);
                mistGain = audioCtx.createGain(); dropGain = audioCtx.createGain(); birdGain = audioCtx.createGain();
                reverbNode = createReverb(); reverbGain = audioCtx.createGain(); analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
                const n = audioCtx.currentTime; [mistGain, dropGain, birdGain].forEach(g => g.gain.setValueAtTime(0, n));
                mistGain.gain.linearRampToValueAtTime(getMistGain(s.mistVol.value), n + 1.5);
                dropGain.gain.linearRampToValueAtTime(getDropGain(s.dropVol.value), n + 1.5);
                birdGain.gain.linearRampToValueAtTime(getBirdGain(s.birdVol.value), n + 1.5);
                reverbGain.gain.value = parseFloat(s.reverb.value);
                scriptNode.onaudioprocess = (ev) => {
                    const oL = ev.outputBuffer.getChannelData(0), oR = ev.outputBuffer.getChannelData(1), sr = audioCtx.sampleRate;
                    const bF = 0.85 - (waveWidth * 0.82), iA = (2 * Math.PI * bF) / sr, iB = (2 * Math.PI * bF * 0.73) / sr, iC = (2 * Math.PI * bF * 1.41) / sr;
                    for (let i = 0; i < oL.length; i++) {
                        phaseA += iA; phaseB += iB; phaseC += iC;
                        const mod = ((Math.sin(phaseA) + 0.5 * Math.sin(phaseB) + 0.3 * Math.sin(phaseC)) / 1.8) * (waveHeight * 0.25); 
                        // 反転対応: ここで算出される curF (フィルター強度) をそのまま維持
                        const curF = Math.max(0.01, Math.min(0.99, baseFilterWeight + mod));
                        const wL = Math.random() * 2 - 1, wR = Math.random() * 2 - 1, cL = wL, cR = (wR * stereoWidth) + (wL * (1 - stereoWidth));
                        const bL = (lastOutL * curF) + (cL * (1 - curF)), bR = (lastOutR * curF) + (cR * (1 - curF));
                        oL[i] = bL; oR[i] = bR; lastOutL = bL; lastOutR = bR;
                    }
                };
                scriptNode.connect(mistGain); mistGain.connect(analyser); dropGain.connect(analyser); dropGain.connect(reverbNode); birdGain.connect(analyser); birdGain.connect(reverbNode); reverbNode.connect(reverbGain); reverbGain.connect(analyser); analyser.connect(audioCtx.destination);
                const dA = new Uint8Array(analyser.frequencyBinCount), mX = Math.floor((24000 / (audioCtx.sampleRate / 2)) * dA.length);
                const draw = () => {
                    if (!isPlaying) return; requestAnimationFrame(draw); if (!isVisible) return;
                    analyser.getByteFrequencyData(dA); tempCtx.drawImage(canvas, 0, 1);
                    for (let i = 0; i < canvas.width; i++) {
                        const idx = Math.floor((i / canvas.width) * mX);
                        const gray = 255 - dA[idx];
                        const p = i * 4; imgData.data[p] = gray; imgData.data[p+1] = gray; imgData.data[p+2] = gray; imgData.data[p+3] = 255;
                    }
                    ctx.drawImage(tempCanvas, 0, 0); ctx.putImageData(imgData, 0, 0);
                }
                draw(); playDrop(); playBird();
            }
        });
    </script>
</body>
</html>
