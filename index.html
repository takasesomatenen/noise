<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio-Visual Noise</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; }
        /* 画面全体に広がるキャンバス */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        /* ボタンを一番手前に */
        button { 
            position: relative; z-index: 10;
            width: 80px; height: 80px; border-radius: 50%; border: none; 
            background: #000000; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            transition: all 0.5s ease; outline: none;
            border: 2px solid rgba(255,255,255,0.2);
        }
        button.active { background: #e74c3c; transform: scale(0.85); box-shadow: 0 0 30px rgba(231, 76, 60, 0.6); }
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <button id="btn"></button>

    <script>
        let audioCtx;
        let scriptNode;
        let gainNode;
        let lastOut = 0;
        const btn = document.getElementById('btn');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // キャンバスのサイズを画面に合わせる
        function resize() {
            canvas.width = window.innerWidth / 4; // 負荷軽減のため解像度を少し落とす
            canvas.height = window.innerHeight / 4;
        }
        window.addEventListener('resize', resize);
        resize();

        btn.addEventListener('click', async () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (scriptNode) {
                const fadeTime = 0.5;
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + fadeTime);
                btn.classList.remove('active');
                setTimeout(() => {
                    if (scriptNode) {
                        scriptNode.disconnect();
                        scriptNode = null;
                        ctx.clearRect(0, 0, canvas.width, canvas.height); // 停止時に画面をクリア
                    }
                }, fadeTime * 1000);
            } else {
                scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
                gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

                // ピクセル描画用のデータ準備
                const imgData = ctx.createImageData(canvas.width, canvas.height);

                scriptNode.onaudioprocess = (audioProcessingEvent) => {
                    const outputData = audioProcessingEvent.outputBuffer.getChannelData(0);
                    
                    for (let i = 0; i < outputData.length; i++) {
                        const white = Math.random() * 2 - 1;
                        const brown = (lastOut * 0.9) + (white * 0.1);
                        outputData[i] = brown;
                        lastOut = brown;

                        // --- ビジュアライズ処理 ---
                        // 音の数値（-1〜1）を 0〜255 の輝度に変換
                        const brightness = (brown + 1) * 128;
                        
                        // キャンバス上の対応する位置に色を塗る
                        // i 番目の音を i 番目のピクセル（RGBAなので4つ飛ばし）に代入
                        const p = i * 4;
                        imgData.data[p] = brightness;     // R
                        imgData.data[p + 1] = brightness; // G
                        imgData.data[p + 2] = brightness; // B
                        imgData.data[p + 3] = 255;        // A (不透明度)
                    }
                    // 描画を更新
                    ctx.putImageData(imgData, 0, 0);
                };

                scriptNode.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.5);
                btn.classList.add('active');
            }
        });
    </script>
</body>
</html>
