<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Noise Tuner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
        .controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 20px;
            background: rgba(0, 0, 0, 0.7); padding: 25px; border-radius: 30px; backdrop-filter: blur(15px);
        }
        button { 
            width: 65px; height: 65px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); 
            background: #000; cursor: pointer; transition: all 0.3s ease; outline: none;
        }
        button.active { background: #e74c3c; box-shadow: 0 0 25px rgba(231, 76, 60, 0.7); transform: scale(0.9); }
        input[type=range] { width: 220px; cursor: pointer; accent-color: #e74c3c; margin: 10px 0; }
        .label { color: rgba(255,255,255,0.8); font-size: 11px; letter-spacing: 2px; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <div class="controls">
        <div class="label">HIGH-CUT / FULL-RANGE</div>
        <input type="range" id="filterRange" min="0" max="1" step="0.01" value="0">
        <button id="btn"></button>
    </div>

    <script>
        let audioCtx;
        let scriptNode;
        let gainNode;
        let analyserNode;
        let lastOut = 0;
        let blendValue = 0;

        const btn = document.getElementById('btn');
        const range = document.getElementById('filterRange');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d', { alpha: false });

        range.addEventListener('input', (e) => {
            blendValue = parseFloat(e.target.value);
        });

        function resize() {
            canvas.width = window.innerWidth / 2;
            canvas.height = window.innerHeight / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        let imgData, tempCanvas, tempCtx;
        function prepareImageData() {
            imgData = ctx.createImageData(canvas.width, 1);
            tempCanvas = document.createElement('canvas');
            tempCtx = tempCanvas.getContext('2d', { alpha: false });
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
        }
        prepareImageData();

        // --- 再生・停止のコア関数 ---
        async function toggleNoise() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            if (scriptNode) {
                const fadeTime = 0.5;
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + fadeTime);
                btn.classList.remove('active');
                
                // メディアセッションの状態更新
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.playbackState = "paused";
                }

                setTimeout(() => {
                    if (scriptNode) {
                        scriptNode.disconnect();
                        analyserNode.disconnect();
                        scriptNode = null;
                        analyserNode = null;
                    }
                }, fadeTime * 1000);
            } else {
                scriptNode = audioCtx.createScriptProcessor(8192, 1, 1);
                gainNode = audioCtx.createGain();
                analyserNode = audioCtx.createAnalyser();
                analyserNode.fftSize = 2048;

                scriptNode.onaudioprocess = (audioProcessingEvent) => {
                    const outputData = audioProcessingEvent.outputBuffer.getChannelData(0);
                    let localLastOut = lastOut;
                    for (let i = 0; i < outputData.length; i++) {
                        const white = Math.random() * 2 - 1;
                        const brown = (localLastOut * 0.96) + (white * 0.04);
                        localLastOut = brown;
                        outputData[i] = (white * (1 - blendValue)) + (brown * blendValue);
                    }
                    lastOut = localLastOut;
                };

                scriptNode.connect(gainNode);
                gainNode.connect(analyserNode);
                analyserNode.connect(audioCtx.destination);
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.7, audioCtx.currentTime + 0.5);
                btn.classList.add('active');

                // メディアセッションの設定
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: 'Noise Tuner',
                        artist: 'Internal Sound Gen',
                        album: 'Focus Noise'
                    });
                    navigator.mediaSession.playbackState = "playing";
                    
                    // イヤホン等のボタン操作を紐付け
                    navigator.mediaSession.setActionHandler('play', toggleNoise);
                    navigator.mediaSession.setActionHandler('pause', toggleNoise);
                }

                draw();
            }
        }

        // クリック操作
        btn.addEventListener('click', toggleNoise);

        // キーボード操作 (Spaceキー)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // 画面スクロール防止
                toggleNoise();
            }
        });

        function draw() {
            if (!analyserNode) return;
            requestAnimationFrame(draw);
            const bufferLength = analyserNode.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyserNode.getByteFrequencyData(dataArray);
            
            for (let i = 0; i < canvas.width; i++) {
                const audioIdx = Math.floor((i / canvas.width) * bufferLength);
                const value = dataArray[audioIdx];
                let r, g, b;
                if (value < 128) {
                    r = value * 2; g = 0; b = 0;
                } else if (value < 220) {
                    r = 255; g = (value - 128) * 2.8; b = 0;
                } else {
                    r = 255; g = 255; b = (value - 220) * 7;
                }
                const p = i * 4;
                imgData.data[p] = r; imgData.data[p+1] = g; imgData.data[p+2] = b; imgData.data[p+3] = 255;
            }
            tempCtx.drawImage(canvas, 0, 0);
            ctx.drawImage(tempCanvas, 0, 1);
            ctx.putImageData(imgData, 0, 0);
        }
    </script>
</body>
</html>
