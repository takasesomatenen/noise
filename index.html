<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stereo Organic Wave Mixer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Helvetica Neue", Arial, sans-serif; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
        
        .controls {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 6px;
            background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 30px; backdrop-filter: blur(10px);
            min-width: 260px; border: 1px solid rgba(255,255,255,0.1);
        }

        button { 
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); 
            background: #000; cursor: pointer; transition: all 0.3s ease; outline: none; margin-bottom: 5px;
        }
        button.active { background: #4ca1af; border-color: #4ca1af; box-shadow: 0 0 25px rgba(76, 161, 175, 0.6); transform: scale(0.9); }

        .slider-group { width: 100%; display: flex; flex-direction: column; gap: 4px; }
        .slider-item { display: flex; flex-direction: column; gap: 1px; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: #4ca1af; }
        .label { color: white; font-size: 7px; letter-spacing: 1.5px; opacity: 0.6; text-transform: uppercase; text-align: center; }

        .logo-container {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            z-index: 5; color: white; text-align: center; white-space: nowrap;
        }
        .logo-text { font-size: 11px; font-weight: 300; letter-spacing: 0.3em; opacity: 0.6; text-transform: uppercase; }
        .logo-symbol { display: inline-block; vertical-align: middle; width: 8px; height: 8px; background-color: white; border-radius: 50%; margin-left: 8px; margin-right: 4px; }
        .logo-symbol-outline { display: inline-block; vertical-align: middle; width: 6px; height: 6px; border: 1px solid white; border-radius: 50%; }
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    
    <div class="controls">
        <button id="btn"></button>
        <div class="slider-group">
            <div class="slider-item">
                <div class="label">Noise Color (Base)</div>
                <input type="range" id="filterRange" min="0.2" max="0.8" step="0.01" value="0.7">
            </div>
            <div class="slider-item">
                <div class="label">Stereo Width</div>
                <input type="range" id="stereoRange" min="0" max="1" step="0.01" value="0.5">
            </div>
            <div class="slider-item">
                <div class="label">Wave Height</div>
                <input type="range" id="waveHeightRange" min="0" max="1" step="0.01" value="0.5">
            </div>
            <div class="slider-item">
                <div class="label">Wave Width</div>
                <input type="range" id="waveWidthRange" min="0" max="1" step="0.01" value="0.7">
            </div>
            <div class="slider-item">
                <div class="label">Noise Volume</div>
                <input type="range" id="noiseVolRange" min="0" max="1" step="0.01" value="0.4">
            </div>
            <div class="slider-item">
                <div class="label">Melody Volume</div>
                <input type="range" id="marimbaVolRange" min="0" max="1" step="0.01" value="0.3">
            </div>
            <div class="slider-item">
                <div class="label">Melody Reverb</div>
                <input type="range" id="reverbRange" min="0" max="1" step="0.01" value="0.5">
            </div>
            <div class="slider-item">
                <div class="label">Melody Density</div>
                <input type="range" id="intervalRange" min="100" max="3000" step="50" value="2000">
            </div>
        </div>
    </div>

    <div class="logo-container">
        <div class="logo-text">DESIGNED BY <span class="logo-symbol"></span><span class="logo-symbol-outline"></span></div>
    </div>

    <script>
        let audioCtx, scriptNode, noiseGain, marimbaMasterGain, reverbNode, reverbGain, analyser;
        let lastOutL = 0, lastOutR = 0, baseFilterWeight = 0.7, stereoWidth = 0.5;
        let waveHeight = 0.5, waveWidth = 0.7, isPlaying = false, marimbaTimer;
        let phaseA = 0, phaseB = 0, phaseC = 0;

        const btn = document.getElementById('btn');
        const filterRange = document.getElementById('filterRange');
        const stereoRange = document.getElementById('stereoRange');
        const waveHeightRange = document.getElementById('waveHeightRange');
        const waveWidthRange = document.getElementById('waveWidthRange');
        const noiseVolRange = document.getElementById('noiseVolRange');
        const marimbaVolRange = document.getElementById('marimbaVolRange');
        const reverbRange = document.getElementById('reverbRange');
        const intervalRange = document.getElementById('intervalRange');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // 【修正】最大音量をこれまでの約6割に抑制 (0.6 * 0.6 = 0.36)
        const getNoiseGainValue = (val) => parseFloat(val) * 0.36;

        filterRange.addEventListener('input', (e) => baseFilterWeight = parseFloat(e.target.value));
        stereoRange.addEventListener('input', (e) => stereoWidth = parseFloat(e.target.value));
        waveHeightRange.addEventListener('input', (e) => waveHeight = parseFloat(e.target.value));
        waveWidthRange.addEventListener('input', (e) => waveWidth = parseFloat(e.target.value));
        noiseVolRange.addEventListener('input', (e) => noiseGain && noiseGain.gain.setTargetAtTime(getNoiseGainValue(e.target.value), audioCtx.currentTime, 0.05));
        marimbaVolRange.addEventListener('input', (e) => marimbaMasterGain && marimbaMasterGain.gain.setTargetAtTime(parseFloat(e.target.value), audioCtx.currentTime, 0.05));
        reverbRange.addEventListener('input', (e) => reverbGain && reverbGain.gain.setTargetAtTime(parseFloat(e.target.value), audioCtx.currentTime, 0.05));

        function resize() {
            canvas.width = window.innerWidth / 2;
            canvas.height = window.innerHeight / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        let imgData, tempCanvas, tempCtx;
        function prepareImageData() {
            imgData = ctx.createImageData(canvas.width, 1);
            tempCanvas = document.createElement('canvas');
            tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
        }
        prepareImageData();

        function createReverb() {
            const len = audioCtx.sampleRate * 4;
            const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
            for (let c = 0; c < 2; c++) {
                const d = buf.getChannelData(c);
                for (let i = 0; i < len; i++) {
                    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 4);
                }
            }
            const node = audioCtx.createConvolver();
            node.buffer = buf;
            return node;
        }

        function playMarimba() {
            if (!isPlaying) return;
            const now = audioCtx.currentTime;
            const scale = [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51, 1567.98, 1760.00, 2093.00, 2349.32, 2637.02, 3135.96, 3520.00]; 
            const freq = scale[Math.floor(Math.random() * scale.length)];

            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq * 2, now);
            osc.frequency.exponentialRampToValueAtTime(freq, now + 0.02);

            const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.02, audioCtx.sampleRate);
            const nd = noiseBuf.getChannelData(0);
            for (let i = 0; i < noiseBuf.length; i++) nd[i] = Math.random() * 0.4;
            const ns = audioCtx.createBufferSource();
            ns.buffer = noiseBuf;
            const ng = audioCtx.createGain();

            const interval = 3100 - parseInt(intervalRange.value);
            const decay = Math.min(1.2, (interval / 1000) + 0.1);

            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(0.3, now + 0.005);
            g.gain.exponentialRampToValueAtTime(0.001, now + decay);
            ng.gain.setValueAtTime(0.15, now);
            ng.gain.exponentialRampToValueAtTime(0.001, now + 0.01);

            osc.connect(g); g.connect(marimbaMasterGain);
            ns.connect(ng); ng.connect(marimbaMasterGain);
            
            osc.start(now); osc.stop(now + decay + 0.1);
            ns.start(now);

            marimbaTimer = setTimeout(playMarimba, interval * (Math.random() * 0.4 + 0.8));
        }

        btn.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isPlaying) {
                isPlaying = false;
                clearTimeout(marimbaTimer);
                btn.classList.remove('active');
                if(noiseGain) noiseGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                if(marimbaMasterGain) marimbaMasterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                setTimeout(() => { if(scriptNode) scriptNode.disconnect(); analyser && analyser.disconnect(); scriptNode = null; }, 600);
            } else {
                isPlaying = true;
                btn.classList.add('active');
                scriptNode = audioCtx.createScriptProcessor(4096, 0, 2);
                noiseGain = audioCtx.createGain();
                marimbaMasterGain = audioCtx.createGain();
                reverbNode = createReverb();
                reverbGain = audioCtx.createGain();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;

                noiseGain.gain.value = getNoiseGainValue(noiseVolRange.value);
                marimbaMasterGain.gain.value = parseFloat(marimbaVolRange.value);
                reverbGain.gain.value = parseFloat(reverbRange.value);

                scriptNode.onaudioprocess = (e) => {
                    const outL = e.outputBuffer.getChannelData(0);
                    const outR = e.outputBuffer.getChannelData(1);
                    const sampleRate = audioCtx.sampleRate;
                    
                    const baseFreq = 0.85 - (waveWidth * 0.82);
                    const incrA = (2 * Math.PI * baseFreq) / sampleRate;
                    const incrB = (2 * Math.PI * baseFreq * 0.73) / sampleRate;
                    const incrC = (2 * Math.PI * baseFreq * 1.41) / sampleRate;

                    for (let i = 0; i < outL.length; i++) {
                        phaseA += incrA;
                        phaseB += incrB;
                        phaseC += incrC;
                        const rawMod = (Math.sin(phaseA) + 0.5 * Math.sin(phaseB) + 0.3 * Math.sin(phaseC)) / 1.8;
                        const modulation = rawMod * (waveHeight * 0.25); 
                        const currentFilter = Math.max(0.01, Math.min(0.99, baseFilterWeight + modulation));

                        const whiteL = Math.random() * 2 - 1;
                        const whiteR = Math.random() * 2 - 1;
                        
                        const combinedL = whiteL;
                        const combinedR = (whiteR * stereoWidth) + (whiteL * (1 - stereoWidth));

                        const brownL = (lastOutL * currentFilter) + (combinedL * (1 - currentFilter));
                        const brownR = (lastOutR * currentFilter) + (combinedR * (1 - currentFilter));
                        
                        outL[i] = brownL;
                        outR[i] = brownR;
                        lastOutL = brownL;
                        lastOutR = brownR;
                    }
                };

                scriptNode.connect(noiseGain);
                noiseGain.connect(analyser);
                marimbaMasterGain.connect(analyser);
                marimbaMasterGain.connect(reverbNode);
                reverbNode.connect(reverbGain);
                reverbGain.connect(analyser);
                analyser.connect(audioCtx.destination);

                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                const maxIndexToDraw = Math.floor((24000 / (audioCtx.sampleRate / 2)) * dataArray.length);

                const draw = () => {
                    if (!isPlaying) return;
                    requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);
                    for (let i = 0; i < canvas.width; i++) {
                        const val = dataArray[Math.floor((i / canvas.width) * maxIndexToDraw)];
                        let r = 0, g = 0, b = 0;
                        if (val < 128) { r = val * 2; }
                        else if (val < 192) { r = 255; g = (val - 128) * 4; }
                        else { r = 255; g = 255; b = (val - 192) * 4; }
                        const p = i * 4;
                        imgData.data[p] = r; imgData.data[p+1] = g; imgData.data[p+2] = b; imgData.data[p+3] = 255;
                    }
                    tempCtx.drawImage(canvas, 0, 0);
                    ctx.drawImage(tempCanvas, 0, 1);
                    ctx.putImageData(imgData, 0, 0);
                }
                draw();
                playMarimba();
            }
        });
    </script>
</body>
</html>
