<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ambient Noise Layer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Helvetica Neue", Arial, sans-serif; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
        .controls {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 25px;
            background: rgba(0, 0, 0, 0.4); padding: 30px; border-radius: 30px; backdrop-filter: blur(8px);
        }
        button { 
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); 
            background: #000; cursor: pointer; transition: all 0.3s ease; outline: none;
        }
        button.active { background: #4ca1af; border-color: #4ca1af; box-shadow: 0 0 25px rgba(76, 161, 175, 0.6); transform: scale(0.9); }
        input[type=range] { width: 180px; cursor: pointer; accent-color: #4ca1af; }
        .label { color: white; font-size: 10px; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; }
        .logo-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 5; color: white; text-align: center; white-space: nowrap;
        }
        .logo-text { font-size: 13px; font-weight: 300; letter-spacing: 0.3em; opacity: 0.6; text-transform: uppercase; }
        .logo-symbol { display: inline-block; vertical-align: middle; width: 10px; height: 10px; background-color: white; border-radius: 50%; margin-left: 10px; margin-right: 5px; }
        .logo-symbol-outline { display: inline-block; vertical-align: middle; width: 8px; height: 8px; border: 1px solid white; border-radius: 50%; }
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <div class="controls">
        <div class="label">Color Filter</div>
        <input type="range" id="filterRange" min="0" max="0.99" step="0.01" value="0.9">
        <button id="btn"></button>
    </div>
    <div class="logo-container">
        <div class="logo-text">DESIGNED BY <span class="logo-symbol"></span><span class="logo-symbol-outline"></span></div>
    </div>

    <script>
        let audioCtx, scriptNode, gainNode, analyserNode;
        let lastOut = 0;
        let filterWeight = 0.9;
        let isPlaying = false;
        const btn = document.getElementById('btn');
        const range = document.getElementById('filterRange');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        range.addEventListener('input', (e) => filterWeight = parseFloat(e.target.value));

        function resize() {
            canvas.width = window.innerWidth / 2;
            canvas.height = window.innerHeight / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        let imgData, tempCanvas, tempCtx;
        function prepareImageData() {
            imgData = ctx.createImageData(canvas.width, 1);
            tempCanvas = document.createElement('canvas');
            tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
        }
        prepareImageData();

        // マリンバの音を合成して鳴らす関数
        function playMarimba() {
            if (!isPlaying) return;

            const now = audioCtx.currentTime;
            // 琉球音階やペンタトニカルな周波数リスト
            const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; 
            const freq = scale[Math.floor(Math.random() * scale.length)];

            // メインのサイン波
            const osc = audioCtx.createOscillator();
            const marimbaGain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);

            // エンベロープ: 叩いた瞬間に最大、すぐ消える
            marimbaGain.gain.setValueAtTime(0, now);
            marimbaGain.gain.linearRampToValueAtTime(0.2, now + 0.01); 
            marimbaGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

            osc.connect(marimbaGain);
            marimbaGain.connect(analyserNode); // アナライザーに繋ぐことで波形が出る
            
            osc.start(now);
            osc.stop(now + 0.6);

            // 次の音を鳴らすタイミングをランダムに決定（0.5秒〜3秒の間）
            setTimeout(playMarimba, 500 + Math.random() * 2500);
        }

        btn.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            if (isPlaying) {
                isPlaying = false;
                const fadeTime = 0.5;
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + fadeTime);
                btn.classList.remove('active');
                setTimeout(() => {
                    if (scriptNode) {
                        scriptNode.disconnect();
                        analyserNode.disconnect();
                        scriptNode = null;
                        analyserNode = null;
                    }
                }, fadeTime * 1000);
            } else {
                isPlaying = true;
                scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
                gainNode = audioCtx.createGain();
                analyserNode = audioCtx.createAnalyser();
                analyserNode.fftSize = 2048;
                const bufferLength = analyserNode.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                scriptNode.onaudioprocess = (e) => {
                    const outputData = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < outputData.length; i++) {
                        const white = Math.random() * 2 - 1;
                        const brown = (lastOut * filterWeight) + (white * (1 - filterWeight));
                        outputData[i] = brown;
                        lastOut = brown;
                    }
                };

                scriptNode.connect(gainNode);
                gainNode.connect(analyserNode);
                analyserNode.connect(audioCtx.destination);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.5);
                btn.classList.add('active');

                // 描画ループ
                const draw = () => {
                    if (!analyserNode) return;
                    requestAnimationFrame(draw);
                    analyserNode.getByteFrequencyData(dataArray);
                    for (let i = 0; i < canvas.width; i++) {
                        const ratio = i / canvas.width;
                        const audioIdx = Math.floor(ratio * bufferLength);
                        const value = dataArray[audioIdx];
                        let r, g, b;
                        if (value < 128) { r = value * 2; g = 0; b = 0; }
                        else if (value < 192) { r = 255; g = (value - 128) * 4; b = 0; }
                        else { r = 255; g = 255; b = (value - 192) * 4; }
                        const p = i * 4;
                        imgData.data[p] = r; imgData.data[p+1] = g; imgData.data[p+2] = b; imgData.data[p+3] = 255;
                    }
                    tempCtx.drawImage(canvas, 0, 0);
                    ctx.drawImage(tempCanvas, 0, 1);
                    ctx.putImageData(imgData, 0, 0);
                }
                draw();
                playMarimba(); // マリンバ開始
            }
        });
    </script>
</body>
</html>
