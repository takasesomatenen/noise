<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOISE</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: #fff; font-family: "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; 
        }
        
        canvas#visualizer { 
            position: fixed; top: 0; left: 0; 
            width: 100vw !important; height: 100vh !important; 
            display: block; cursor: pointer; z-index: 1;
        }
        
        .controls {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.65); padding: 18px; border-radius: 20px; backdrop-filter: blur(10px);
            min-width: 260px; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            max-height: 90vh; overflow-y: auto;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .controls.hidden { opacity: 0; transform: translate(-50%, -45%); pointer-events: none; }
        
        /* 再生ボタン: CSSで確実に黒い円を表示 */
        .play-wrapper { 
            position: relative; width: 76px; height: 76px; margin: 10px 0 15px 0; 
            background: #000; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        /* 最前面に配置してクリックを確実に拾う */
        button#btn { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            border-radius: 50%; border: none; background: transparent; outline: none; 
            z-index: 100; cursor: pointer; 
        }
        /* 描画専用。クリックは透過させる */
        canvas#btnVisualizer { 
            position: absolute; top: 0; left: 0;
            width: 100% !important; height: 100% !important; 
            z-index: 50; pointer-events: none; 
        }
        
        details { width: 100%; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 5px 0; }
        summary { color: #000; font-size: 10px; font-weight: bold; letter-spacing: 2px; cursor: pointer; outline: none; list-style: none; padding: 5px; display: flex; align-items: center; justify-content: flex-start; opacity: 0.7; }
        .part-switch { margin-right: 12px; width: 14px; height: 14px; cursor: pointer; accent-color: #000; }
        .summary-text { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; }
        .summary-text::after { content: '＋'; font-weight: normal; font-size: 10px; margin-left: 10px; }
        details[open] .summary-text::after { content: '－'; }
        
        .slider-group { padding: 10px 5px; display: flex; flex-direction: column; gap: 8px; }
        .slider-item { display: flex; flex-direction: column; gap: 2px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #000; }
        .label { color: #000; font-size: 7px; letter-spacing: 1.5px; opacity: 0.5; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .count-val { opacity: 0.8; font-family: monospace; }
        
        .timer-input-row { display: flex; align-items: center; gap: 4px; margin-top: 4px; }
        .timer-input-row input { background: transparent; border: 1px solid rgba(0,0,0,0.1); border-radius: 4px; width: 35px; font-size: 11px; text-align: center; padding: 2px; outline: none; }
        .timer-unit { font-size: 9px; opacity: 0.5; margin-right: 4px; }
        .clear-btn { margin-left: auto; font-size: 8px; font-weight: bold; letter-spacing: 1px; color: #fff; background: #000; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; opacity: 0.8; }
        .timer-display { font-family: monospace; font-size: 10px; opacity: 0.8; letter-spacing: 0; }

        .logo-container { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 5; color: #000; text-align: center; white-space: nowrap; pointer-events: none; }
        .logo-text { font-size: 11px; font-weight: 300; letter-spacing: 0.3em; opacity: 0.4; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .logo-symbol { display: inline-block; width: 8px; height: 8px; background-color: #000; border-radius: 50%; margin-left: 8px; margin-right: 4px; margin-top: -1px;}
        .logo-symbol-outline { display: inline-block; width: 6px; height: 6px; border: 1px solid #000; border-radius: 50%; margin-top: -1px;}
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <div class="controls" id="panel">
        <div class="play-wrapper">
            <canvas id="btnVisualizer"></canvas>
            <button id="btn"></button>
        </div>
        
        <details id="timerSection">
            <summary><div style="width:26px"></div><div class="summary-text">TIMER <span id="remainingTime" class="timer-display"></span></div></summary>
            <div class="slider-group">
                <div class="timer-input-row">
                    <input type="number" id="timerH" min="0" placeholder="0"><span class="timer-unit">h</span>
                    <input type="number" id="timerM" min="0" max="59" placeholder="0"><span class="timer-unit">m</span>
                    <button class="clear-btn" id="timerClear">CLEAR</button>
                </div>
            </div>
        </details>

        <details>
            <summary><input type="checkbox" id="mistEnable" class="part-switch" checked><div class="summary-text">MIST</div></summary>
            <div class="slider-group">
                <div class="slider-item"><div class="label">Volume</div><input type="range" id="mistVolRange" min="0" max="1" step="0.01" value="0.4"></div>
                <div class="slider-item"><div class="label">Count <span class="count-val" id="mistCountDisplay">[1]</span></div><input type="range" id="mistCountRange" min="1" max="10" step="1" value="1"></div>
                <div class="slider-item"><div class="label">Color</div><input type="range" id="filterRange" min="0.2" max="0.8" step="0.01" value="0.7"></div>
                <div class="slider-item"><div class="label">Stereo Width</div><input type="range" id="stereoRange" min="0" max="1" step="0.01" value="0.5"></div>
                <div class="slider-item"><div class="label">Wave Height</div><input type="range" id="waveHeightRange" min="0" max="1" step="0.01" value="0.5"></div>
                <div class="slider-item"><div class="label">Wave Width</div><input type="range" id="waveWidthRange" min="0" max="1" step="0.01" value="0.7"></div>
            </div>
        </details>

        <details>
            <summary><input type="checkbox" id="dropEnable" class="part-switch" checked><div class="summary-text">DROP</div></summary>
            <div class="slider-group">
                <div class="slider-item"><div class="label">Volume</div><input type="range" id="dropVolRange" min="0" max="1" step="0.01" value="0.3"></div>
                <div class="slider-item"><div class="label">Count <span class="count-val" id="dropCountDisplay">[4]</span></div><input type="range" id="dropCountRange" min="1" max="10" step="1" value="4"></div>
                <div class="slider-item"><div class="label">Stereo Width</div><input type="range" id="dropStereoRange" min="0" max="1" step="0.01" value="0.5"></div>
                <div class="slider-item"><div class="label">Reverb</div><input type="range" id="reverbRange" min="0" max="1" step="0.01" value="0.5"></div>
                <div class="slider-item"><div class="label">Density</div><input type="range" id="dropIntervalRange" min="100" max="3000" step="50" value="2000"></div>
            </div>
        </details>

        <details>
            <summary><input type="checkbox" id="birdEnable" class="part-switch" checked><div class="summary-text">BIRD</div></summary>
            <div class="slider-group">
                <div class="slider-item"><div class="label">Volume</div><input type="range" id="birdVolRange" min="0" max="1" step="0.01" value="0.25"></div>
                <div class="slider-item"><div class="label">Count <span class="count-val" id="birdCountDisplay">[2]</span></div><input type="range" id="birdCountRange" min="1" max="10" step="1" value="2"></div>
                <div class="slider-item"><div class="label">Stereo Width</div><input type="range" id="birdStereoRange" min="0" max="1" step="0.01" value="0.5"></div>
                <div class="slider-item"><div class="label">Pitch Speed</div><input type="range" id="birdPitchSpeedRange" min="0.05" max="0.5" step="0.01" value="0.15"></div>
                <div class="slider-item"><div class="label">Density</div><input type="range" id="birdIntervalRange" min="100" max="3000" step="50" value="1500"></div>
            </div>
        </details>
    </div>
    <div class="logo-container">
        <div class="logo-text">DESIGNED BY <span class="logo-symbol"></span><span class="logo-symbol-outline"></span></div>
    </div>

    <script>
        let audioCtx, scriptNode, mistGain, dropGain, birdGain, reverbNode, reverbGain, masterGain, analyser;
        let lastOutL = 0, lastOutR = 0, baseFilterWeight = 0.7, stereoWidth = 0.5, waveHeight = 0.5, waveWidth = 0.7;
        let isPlaying = false, isVisible = true, phaseA = 0, phaseB = 0, phaseC = 0;
        let dropTimers = [], birdTimers = [];
        let timerRemaining = 0, timerInterval = null;

        const btn = document.getElementById('btn'), panel = document.getElementById('panel');
        const btnCanvas = document.getElementById('btnVisualizer'), btnCtx = btnCanvas.getContext('2d');
        const mistEnable = document.getElementById('mistEnable'), dropEnable = document.getElementById('dropEnable'), birdEnable = document.getElementById('birdEnable');
        const inH = document.getElementById('timerH'), inM = document.getElementById('timerM'), timerClear = document.getElementById('timerClear'), displayTime = document.getElementById('remainingTime');
        const canvas = document.getElementById('visualizer'), ctx = canvas.getContext('2d');

        const s = {
            mistVol: document.getElementById('mistVolRange'), mistCount: document.getElementById('mistCountRange'),
            filter: document.getElementById('filterRange'), stereo: document.getElementById('stereoRange'),
            waveHeight: document.getElementById('waveHeightRange'), waveWidth: document.getElementById('waveWidthRange'), 
            dropVol: document.getElementById('dropVolRange'), dropCount: document.getElementById('dropCountRange'),
            dropStereo: document.getElementById('dropStereoRange'), reverb: document.getElementById('reverbRange'), dropInterval: document.getElementById('dropIntervalRange'), 
            birdVol: document.getElementById('birdVolRange'), birdCount: document.getElementById('birdCountRange'),
            birdStereo: document.getElementById('birdStereoRange'), birdPitchSpeed: document.getElementById('birdPitchSpeedRange'), birdInterval: document.getElementById('birdIntervalRange')
        };
        const displays = { mist: document.getElementById('mistCountDisplay'), drop: document.getElementById('dropCountDisplay'), bird: document.getElementById('birdCountDisplay') };
        let tempCanvas, tempCtx, imgData;

        // --- Save/Load ---
        function saveSettings() {
            const data = { inputs: {}, checks: { mist: mistEnable.checked, drop: dropEnable.checked, bird: birdEnable.checked } };
            Object.keys(s).forEach(key => data.inputs[key] = s[key].value);
            data.inputs.timerH = inH.value; data.inputs.timerM = inM.value;
            localStorage.setItem('noise_settings', JSON.stringify(data));
        }
        function loadSettings() {
            const saved = localStorage.getItem('noise_settings');
            if (!saved) { updateLabels(); return; }
            const data = JSON.parse(saved);
            Object.keys(data.inputs).forEach(key => { if (s[key]) s[key].value = data.inputs[key]; });
            inH.value = data.inputs.timerH || ""; inM.value = data.inputs.timerM || "";
            if(data.checks) { mistEnable.checked = data.checks.mist; dropEnable.checked = data.checks.drop; birdEnable.checked = data.checks.bird; }
            baseFilterWeight = parseFloat(s.filter.value); stereoWidth = parseFloat(s.stereo.value); waveHeight = parseFloat(s.waveHeight.value); waveWidth = parseFloat(s.waveWidth.value);
            updateLabels();
        }
        function updateLabels() {
            displays.mist.innerText = `[${s.mistCount.value}]`;
            displays.drop.innerText = `[${s.dropCount.value}]`;
            displays.bird.innerText = `[${s.birdCount.value}]`;
        }

        // --- Timer ---
        function startTimer() {
            const h = parseInt(inH.value) || 0, m = parseInt(inM.value) || 0;
            timerRemaining = (h * 3600) + (m * 60);
            if (timerRemaining > 0) {
                updateTimerDisplay();
                timerInterval = setInterval(() => { timerRemaining--; updateTimerDisplay(); if (timerRemaining <= 0) stopWithFade(); }, 1000);
            }
        }
        function updateTimerDisplay() {
            if (timerRemaining <= 0) { displayTime.innerText = ""; return; }
            const h = Math.floor(timerRemaining / 3600), m = Math.floor((timerRemaining % 3600) / 60), sec = timerRemaining % 60;
            displayTime.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        }
        function stopWithFade() {
            clearInterval(timerInterval);
            if(!masterGain) { if (isPlaying) togglePlay(); return; }
            masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 1.0);
            setTimeout(() => { if (isPlaying) togglePlay(); }, 3500);
        }
        timerClear.onclick = (e) => { e.stopPropagation(); inH.value = ""; inM.value = ""; timerRemaining = 0; displayTime.innerText = ""; clearInterval(timerInterval); saveSettings(); };

        // --- Canvas ---
        function resize() {
            const dpr = window.devicePixelRatio || 1, w = window.innerWidth, h = window.innerHeight;
            canvas.width = Math.ceil(w * dpr); canvas.height = Math.ceil(h * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            if (!tempCanvas) tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
            tempCtx = tempCanvas.getContext('2d'); tempCtx.fillStyle = '#fff'; tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            imgData = ctx.createImageData(canvas.width, 1);
            
            btnCanvas.width = Math.ceil(76 * dpr); btnCanvas.height = Math.ceil(76 * dpr);
            btnCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.onresize = resize;

        function drawButtonVisual() {
            btnCtx.clearRect(0, 0, 76, 76);
            if (!isPlaying || !analyser) { 
                requestAnimationFrame(drawButtonVisual); 
                return; 
            }
            const cx = 76/2, cy = 76/2, baseRadius = 28;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const points = 64, slice = Math.floor(data.length / 4 / points);
            
            btnCtx.beginPath();
            btnCtx.fillStyle = 'rgba(255, 255, 255, 0.9)'; 
            btnCtx.moveTo(cx, cy - baseRadius);
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI, v = data[i * slice] / 255, r = baseRadius + (v * 10); 
                btnCtx.lineTo(cx + Math.sin(angle) * r, cy - Math.cos(angle) * r);
            }
            for (let i = points; i >= 0; i--) {
                const angle = (i / points) * Math.PI, v = data[i * slice] / 255, r = baseRadius + (v * 10);
                btnCtx.lineTo(cx - Math.sin(angle) * r, cy - Math.cos(angle) * r);
            }
            btnCtx.closePath();
            btnCtx.fill();
            requestAnimationFrame(drawButtonVisual);
        }

        // --- Audio Logic ---
        function createReverb() {
            const len = audioCtx.sampleRate * 4, buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
            for (let c = 0; c < 2; c++) { const d = buf.getChannelData(c); for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, 4); }
            const node = audioCtx.createConvolver(); node.buffer = buf; return node;
        }

        const scale = [130.81, 146.83, 164.81, 196.0, 220.0, 261.63, 293.66, 329.63, 392.0, 440.0, 523.25, 587.33, 659.25, 783.99, 880.0, 1046.5, 1174.66, 1318.51, 1567.98, 1760.0, 2093.0, 2349.32, 2637.02, 3135.96, 3520.0];

        function playSingleDrop(index) {
            if (!isPlaying) return;
            const count = parseInt(s.dropCount.value);
            if (index >= count || !dropEnable.checked) { dropTimers[index] = setTimeout(() => playSingleDrop(index), 500); return; }
            const now = audioCtx.currentTime, freq = scale[Math.floor(Math.random()*scale.length)];
            const osc = audioCtx.createOscillator(), g = audioCtx.createGain(), p = audioCtx.createStereoPanner();
            p.pan.setValueAtTime((Math.random()*2-1)*parseFloat(s.dropStereo.value), now);
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq*2, now); osc.frequency.exponentialRampToValueAtTime(freq, now+0.02);
            const interval = 3100 - (parseInt(s.dropInterval.value) || 2000), d = Math.min(1.2, (interval/1000)+0.1);
            g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.3 / Math.sqrt(count), now + 0.005); g.gain.exponentialRampToValueAtTime(0.001, now+d);
            osc.connect(g); g.connect(p); p.connect(dropGain); osc.start(now); osc.stop(now+d+0.1);
            dropTimers[index] = setTimeout(() => playSingleDrop(index), interval * (Math.random()*0.8+0.6));
        }

        function playSingleBird(index, burst = 0) {
            if (!isPlaying) return;
            const count = parseInt(s.birdCount.value);
            if (index >= count || !birdEnable.checked) { birdTimers[index] = setTimeout(() => playSingleBird(index, 0), 500); return; }
            const now = audioCtx.currentTime, freq = scale.slice(15)[Math.floor(Math.random()*10)] * (0.98 + Math.random()*0.04);
            const osc = audioCtx.createOscillator(), g = audioCtx.createGain(), p = audioCtx.createStereoPanner();
            p.pan.setValueAtTime((Math.random()*2-1)*parseFloat(s.birdStereo.value), now);
            osc.type = 'sine'; const sw = (parseFloat(s.birdPitchSpeed.value)||0.15)*(0.8+Math.random()*0.4);
            osc.frequency.setValueAtTime(freq*(Math.random()>0.5?1.5:0.7), now); osc.frequency.exponentialRampToValueAtTime(freq, now+sw);
            g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.2/Math.sqrt(count), now+0.01); g.gain.exponentialRampToValueAtTime(0.001, now+sw+0.05);
            osc.connect(g); g.connect(p); p.connect(birdGain); osc.start(now); osc.stop(now+sw+0.1);
            let nBurst = (Math.random()>0.7 && burst===0) ? Math.floor(Math.random()*3)+1 : Math.max(0, burst-1);
            let nInt = nBurst>0 ? 80 : (3100-(parseInt(s.birdInterval.value)||1500))*(0.5+Math.random()*1.0);
            birdTimers[index] = setTimeout(() => playSingleBird(index, nBurst), nInt);
        }

        async function togglePlay() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            if (isPlaying) {
                isPlaying = false; dropTimers.forEach(clearTimeout); birdTimers.forEach(clearTimeout); clearInterval(timerInterval); displayTime.innerText = "";
                const now = audioCtx.currentTime; [mistGain, dropGain, birdGain].forEach(g => g && g.gain.setTargetAtTime(0, now, 0.2));
                setTimeout(() => { if(scriptNode) scriptNode.disconnect(); if(analyser) analyser.disconnect(); if(masterGain) masterGain.disconnect(); scriptNode = null; lastOutL = 0; lastOutR = 0; }, 1000);
            } else {
                lastOutL = 0; lastOutR = 0; phaseA = 0; phaseB = 0; phaseC = 0; isPlaying = true;
                scriptNode = audioCtx.createScriptProcessor(4096, 0, 2); mistGain = audioCtx.createGain(); dropGain = audioCtx.createGain(); birdGain = audioCtx.createGain(); masterGain = audioCtx.createGain();
                reverbNode = createReverb(); reverbGain = audioCtx.createGain(); analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
                const now = audioCtx.currentTime; masterGain.gain.setValueAtTime(1, now);
                [mistGain, dropGain, birdGain].forEach(g => g.gain.setValueAtTime(0, now));
                mistGain.gain.linearRampToValueAtTime(mistEnable.checked ? parseFloat(s.mistVol.value) * 0.36 : 0, now + 1.5);
                dropGain.gain.linearRampToValueAtTime(dropEnable.checked ? parseFloat(s.dropVol.value) : 0, now + 1.5);
                birdGain.gain.linearRampToValueAtTime(birdEnable.checked ? parseFloat(s.birdVol.value) * 0.6 : 0, now + 1.5);
                reverbGain.gain.value = parseFloat(s.reverb.value);
                scriptNode.onaudioprocess = (e) => {
                    const outL = e.outputBuffer.getChannelData(0), outR = e.outputBuffer.getChannelData(1), sampleRate = audioCtx.sampleRate;
                    const bFreq = 0.85 - (waveWidth * 0.82), incA = (2*Math.PI*bFreq)/sampleRate, incB = (2*Math.PI*bFreq*0.73)/sampleRate, incC = (2*Math.PI*bFreq*1.41)/sampleRate, numM = parseInt(s.mistCount.value);
                    for (let i = 0; i < outL.length; i++) {
                        phaseA += incA; phaseB += incB; phaseC += incC; const mod = ((Math.sin(phaseA) + 0.5 * Math.sin(phaseB) + 0.3 * Math.sin(phaseC)) / 1.8) * (waveHeight * 0.25), curF = Math.max(0.01, Math.min(0.99, baseFilterWeight + mod));
                        let combinedL = 0, combinedR = 0; for(let n=0; n<numM; n++) { const wL = Math.random()*2-1, wR = Math.random()*2-1; combinedL += wL; combinedR += (wR * stereoWidth) + (wL * (1-stereoWidth)); }
                        combinedL /= Math.sqrt(numM); combinedR /= Math.sqrt(numM);
                        let nextL = (lastOutL * curF) + (combinedL * (1-curF)), nextR = (lastOutR * curF) + (combinedR * (1-curF));
                        if (isNaN(nextL)) nextL = 0; if (isNaN(nextR)) nextR = 0; outL[i] = nextL; outR[i] = nextR; lastOutL = nextL; lastOutR = nextR;
                    }
                };
                scriptNode.connect(mistGain); mistGain.connect(analyser); dropGain.connect(analyser); dropGain.connect(reverbNode); birdGain.connect(analyser); birdGain.connect(reverbNode); reverbNode.connect(reverbGain); reverbGain.connect(analyser); analyser.connect(masterGain); masterGain.connect(audioCtx.destination);
                const draw = () => {
                    if (!isPlaying) return; requestAnimationFrame(draw); if (!isVisible) return;
                    const dArray = new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(dArray); const maxIdx = Math.floor((24000 / (audioCtx.sampleRate / 2)) * dArray.length);
                    tempCtx.drawImage(canvas, 0, 1); for (let i = 0; i < canvas.width; i++) { const val = dArray[Math.floor((i / canvas.width) * maxIdx)], gray = 255 - val, p = i * 4; imgData.data[p] = gray; imgData.data[p+1] = gray; imgData.data[p+2] = gray; imgData.data[p+3] = 255; }
                    ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.drawImage(tempCanvas, 0, 0); ctx.putImageData(imgData, 0, 0); ctx.restore();
                }
                draw(); updateVolumes(); startTimer();
                for(let i=0; i<10; i++) { setTimeout(() => playSingleDrop(i), Math.random() * 2000); setTimeout(() => playSingleBird(i), Math.random() * 2000); }
            }
        }

        // --- Interaction ---
        // 直接ボタンのonclickに紐付け、stopPropagationで背景のトグルを防ぐ
        btn.onclick = (e) => { 
            e.stopPropagation(); 
            togglePlay(); 
        };
        
        document.onclick = (e) => {
            // コントロールパネルの中身、またはボタンそのものを触っている場合はパネルを消さない
            if (panel.contains(e.target) || e.target === btn) return;
            // 背景Canvasなどをタップした場合のみトグル
            panel.classList.toggle('hidden');
        };

        window.onload = () => { 
            resize(); 
            loadSettings(); 
            drawButtonVisual(); 
            document.addEventListener('visibilitychange', () => isVisible = (document.visibilityState === 'visible')); 
        };

        // UI Listeners
        s.filter.oninput = (e) => { baseFilterWeight = parseFloat(e.target.value); saveSettings(); };
        s.stereo.oninput = (e) => { stereoWidth = parseFloat(e.target.value); saveSettings(); };
        s.waveHeight.oninput = (e) => { waveHeight = parseFloat(e.target.value); saveSettings(); };
        s.waveWidth.oninput = (e) => { waveWidth = parseFloat(e.target.value); saveSettings(); };
        [s.mistVol, s.dropVol, s.birdVol, s.mistCount, s.dropCount, s.birdCount, inH, inM].forEach(el => el.oninput = () => { if(isPlaying) updateVolumes(); saveSettings(); });
        [mistEnable, dropEnable, birdEnable].forEach(el => el.onclick = (e) => { e.stopPropagation(); if(isPlaying) updateVolumes(); saveSettings(); });
        s.reverb.oninput = (e) => { if (reverbGain && isPlaying) reverbGain.gain.setTargetAtTime(parseFloat(e.target.value), audioCtx.currentTime, 0.05); saveSettings(); };
    </script>
</body>
</html>
