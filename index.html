<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Base Hum Noise</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px;
            background: rgba(0, 0, 0, 0.8); padding: 25px; border-radius: 30px; backdrop-filter: blur(20px);
            width: 260px; border: 1px solid rgba(255,255,255,0.1);
        }
        .slider-group { width: 100%; display: flex; flex-direction: column; gap: 4px; }
        .label { font-size: 9px; letter-spacing: 2px; font-weight: bold; opacity: 0.5; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #e74c3c; }
        button { 
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); 
            background: #000; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        button.active { background: #e74c3c; box-shadow: 0 0 20px rgba(231, 76, 60, 0.6); }
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <div class="controls">
        <div class="slider-group"><div class="label">BASE HUM (背景のザー音)</div><input type="range" id="baseRange" min="0" max="0.5" step="0.001" value="0.05"></div>
        <div class="slider-group"><div class="label">DENSITY (粒の密度)</div><input type="range" id="densityRange" min="0" max="0.05" step="0.0001" value="0.005"></div>
        <button id="btn"></button>
    </div>

    <script>
        let audioCtx, scriptNode, gainNode, analyserNode;
        let lastOut = 0, pLastOut = 0;
        
        // グローバルな設定オブジェクト（これを onaudioprocess 内で参照する）
        const settings = {
            baseVol: 0.05,
            density: 0.005
        };

        const btn = document.getElementById('btn');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d', { alpha: false });

        document.getElementById('baseRange').oninput = (e) => settings.baseVol = parseFloat(e.target.value);
        document.getElementById('densityRange').oninput = (e) => settings.density = parseFloat(e.target.value);

        function resize() { canvas.width = window.innerWidth / 2; canvas.height = window.innerHeight / 2; }
        window.addEventListener('resize', resize);
        resize();

        async function toggleNoise() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            if (scriptNode) {
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                btn.classList.remove('active');
                setTimeout(() => { if(scriptNode){ scriptNode.disconnect(); scriptNode = null; } }, 500);
            } else {
                scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
                gainNode = audioCtx.createGain();
                analyserNode = audioCtx.createAnalyser();
                analyserNode.fftSize = 2048;

                scriptNode.onaudioprocess = (e) => {
                    const out = e.outputBuffer.getChannelData(0);
                    let lOut = lastOut, plOut = pLastOut;
                    
                    for (let i = 0; i < out.length; i++) {
                        // 1. 背景のザー音
                        const w = Math.random() * 2 - 1;
                        const b = (lOut * 0.98) + (w * 0.02);
                        lOut = b;

                        // 2. パルスの粒
                        let pulse = 0;
                        if (Math.random() < settings.density) {
                            pulse = (Math.random() * 2 - 1);
                        }
                        plOut = (plOut * 0.6) + (pulse * 0.4);

                        // スライダーの値をリアルタイムに反映
                        out[i] = (b * settings.baseVol) + (plOut * 0.7);
                    }
                    lastOut = lOut; pLastOut = plOut;
                };

                scriptNode.connect(analyserNode);
                analyserNode.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.5);
                btn.classList.add('active');
                draw();
            }
        }

        btn.addEventListener('click', toggleNoise);

        function draw() {
            if (!scriptNode) return;
            requestAnimationFrame(draw);
            const data = new Uint8Array(analyserNode.frequencyBinCount);
            analyserNode.getByteFrequencyData(data);
            const imgData = ctx.createImageData(canvas.width, 1);
            
            for (let i = 0; i < canvas.width; i++) {
                const val = data[Math.floor((i / canvas.width) * data.length)];
                const p = i * 4;
                // 背景音が小さいとき（valが低いとき）は画面を暗く保つ
                const brightness = val > 40 ? val : 0; 
                
                imgData.data[p] = brightness;     // R
                imgData.data[p+1] = brightness > 160 ? (brightness - 160) * 2 : 0; // G
                imgData.data[p+2] = brightness > 210 ? (brightness - 210) * 5 : 0; // B
                imgData.data[p+3] = 255;
            }
            const temp = document.createElement('canvas');
            temp.width = canvas.width; temp.height = canvas.height;
            temp.getContext('2d').drawImage(canvas, 0, 0);
            ctx.drawImage(temp, 0, 1);
            ctx.putImageData(imgData, 0, 0);
        }
    </script>
</body>
</html>
