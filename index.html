<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stretched Noise</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
        button { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10;
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); 
            background: #000000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            transition: all 0.5s ease; outline: none;
        }
        button.active { background: #e74c3c; transform: translate(-50%, -50%) scale(0.85); box-shadow: 0 0 30px rgba(231, 76, 60, 0.6); }
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <button id="btn"></button>

    <script>
        let audioCtx;
        let scriptNode;
        let gainNode;
        let lastOut = 0;
        const btn = document.getElementById('btn');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // デバイスの画面サイズに合わせてキャンバスを設定
        function resize() {
            canvas.width = window.innerWidth / 2; // パフォーマンスのため内部解像度は下げる
            canvas.height = window.innerHeight / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        btn.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (scriptNode) {
                const fadeTime = 0.5;
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + fadeTime);
                btn.classList.remove('active');
                setTimeout(() => {
                    if (scriptNode) {
                        scriptNode.disconnect();
                        scriptNode = null;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                }, fadeTime * 1000);
            } else {
                scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
                gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

                // --- 画面を覆うImageDataを生成 ---
                const imgData = ctx.createImageData(canvas.width, canvas.height);

                scriptNode.onaudioprocess = (audioProcessingEvent) => {
                    const outputData = audioProcessingEvent.outputBuffer.getChannelData(0);
                    
                    // 音の生成
                    for (let i = 0; i < outputData.length; i++) {
                        const white = Math.random() * 2 - 1;
                        const brown = (lastOut * 0.9) + (white * 0.1);
                        outputData[i] = brown;
                        lastOut = brown;
                    }

                    // --- ビジュアル：画面全体に引き伸ばす ---
                    // 画面のピクセル総数を取得
                    const totalPixels = canvas.width * canvas.height;
                    
                    for (let p = 0; p < totalPixels; p++) {
                        // 【ここがポイント！】
                        // 画面上の位置（p）が、音のデータ（outputData）全体のどのあたりかを計算する
                        // 例：画面の半分（totalPixels/2）の位置なら、音のデータの半分（2048）を見る
                        const audioIdx = Math.floor((p / totalPixels) * outputData.length);
                        
                        // 計算した位置の音のデータを取得し、輝度に変換
                        const val = outputData[audioIdx];
                        const brightness = (val + 1) * 128;
                        
                        // ImageDataに書き込む（RGBAなので4倍）
                        const i = p * 4;
                        imgData.data[i] = brightness;     // R
                        imgData.data[i + 1] = brightness; // G
                        imgData.data[i + 2] = brightness; // B
                        imgData.data[i + 3] = 255;        // A
                    }
                    ctx.putImageData(imgData, 0, 0);
                };

                scriptNode.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.5);
                btn.classList.add('active');
            }
        });
    </script>
</body>
</html>
