<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waterfall Spectrogram</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Helvetica Neue", Arial, sans-serif; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
        
        button { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10;
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); 
            background: #000000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            transition: all 0.5s ease; outline: none;
        }
        button.active { background: #e74c3c; transform: translate(-50%, -50%) scale(0.85); box-shadow: 0 0 30px rgba(231, 76, 60, 0.6); }

        /* --- テキストロゴ用のスタイル --- */
        .logo-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            color: white;
            text-align: center;
            white-space: nowrap; /* 改行を防ぐ */
        }

        .logo-text {
            font-size: 14px;
            font-weight: 300; /* 細めのウェイトで高級感を出す */
            letter-spacing: 0.3em; /* 文字の間隔を広く */
            opacity: 0.7;
            text-transform: uppercase; /* すべて大文字に */
        }

        /* 丸いシンボルの再現 */
        .logo-symbol {
            display: inline-block;
            vertical-align: middle;
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
            margin-left: 10px;
            margin-right: 5px;
        }
        .logo-symbol-outline {
            display: inline-block;
            vertical-align: middle;
            width: 10px;
            height: 10px;
            border: 1px solid white;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <button id="btn"></button>

    <div class="logo-container">
        <div class="logo-text">
            DESIGNED BY <span class="logo-symbol"></span><span class="logo-symbol-outline"></span>
        </div>
    </div>

    <script>
        // --- JavaScript部分は変更なし（以前と同じ） ---
        let audioCtx;
        let scriptNode;
        let gainNode;
        let analyserNode;
        let lastOut = 0;
        const btn = document.getElementById('btn');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth / 2;
            canvas.height = window.innerHeight / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        let imgData, tempCanvas, tempCtx;
        function prepareImageData() {
            imgData = ctx.createImageData(canvas.width, 1);
            tempCanvas = document.createElement('canvas');
            tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
        }
        prepareImageData();

        btn.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (scriptNode) {
                const fadeTime = 0.5;
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + fadeTime);
                btn.classList.remove('active');
                setTimeout(() => {
                    if (scriptNode) {
                        scriptNode.disconnect();
                        analyserNode.disconnect();
                        scriptNode = null;
                        analyserNode = null;
                    }
                }, fadeTime * 1000);
            } else {
                scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
                gainNode = audioCtx.createGain();
                analyserNode = audioCtx.createAnalyser();
                analyserNode.fftSize = 2048;
                const bufferLength = analyserNode.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                scriptNode.onaudioprocess = (audioProcessingEvent) => {
                    const outputData = audioProcessingEvent.outputBuffer.getChannelData(0);
                    for (let i = 0; i < outputData.length; i++) {
                        const white = Math.random() * 2 - 1;
                        const brown = (lastOut * 0.9) + (white * 0.1);
                        outputData[i] = brown;
                        lastOut = brown;
                    }
                };

                scriptNode.connect(gainNode);
                gainNode.connect(analyserNode);
                analyserNode.connect(audioCtx.destination);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.5);
                btn.classList.add('active');

                function draw() {
                    if (!analyserNode) return;
                    requestAnimationFrame(draw);
                    analyserNode.getByteFrequencyData(dataArray);
                    for (let i = 0; i < canvas.width; i++) {
                        const ratio = i / canvas.width;
                        const audioIdx = Math.floor(ratio * bufferLength);
                        const value = dataArray[audioIdx];
                        let r, g, b;
                        if (value < 128) {
                            r = value * 2; g = 0; b = 0;
                        } else if (value < 192) {
                            r = 255; g = (value - 128) * 4; b = 0;
                        } else {
                            r = 255; g = 255; b = (value - 192) * 4;
                        }
                        const p = i * 4;
                        imgData.data[p] = r; imgData.data[p+1] = g; imgData.data[p+2] = b; imgData.data[p+3] = 255;
                    }
                    tempCtx.drawImage(canvas, 0, 0);
                    ctx.drawImage(tempCanvas, 0, 1);
                    ctx.putImageData(imgData, 0, 0);
                }
                draw();
            }
        });
    </script>
</body>
</html>
